services:
  db:
    profiles: ["internal-db"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iz_clinical_notes_analyzer}
      POSTGRES_USER: ${POSTGRES_USER:-iz_clinical_notes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-iz_clinical_notes} -d ${POSTGRES_DB:-iz_clinical_notes_analyzer}']
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://iz_clinical_notes:change-me@127.0.0.1:5432/iz_clinical_notes_analyzer}
      DATABASE_HOST_MODE: ${DATABASE_HOST_MODE:-internal}
      USE_INTERNAL_POSTGRES: ${USE_INTERNAL_POSTGRES:-1}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT:-5173}}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      PORT: 8000
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=5)"']
      interval: 10s
      timeout: 8s
      start_period: 45s
      retries: 18
    ports:
      - '${BACKEND_PORT:-8000}:8000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost/index.html >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - '${FRONTEND_PORT:-5173}:80'

volumes:
  pgdata:
    name: ${POSTGRES_VOLUME_NAME:-iz_clinical_notes_analyzer_pgdata_app}
