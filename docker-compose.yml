services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chartreview}
      POSTGRES_USER: ${POSTGRES_USER:-chart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chart}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chart} -d ${POSTGRES_DB:-chartreview}']
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://chart:chart@db:5432/chartreview}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT:-5173}}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=2)"']
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - '${BACKEND_PORT:-8000}:8000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost/index.html >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - '${FRONTEND_PORT:-5173}:80'

volumes:
  pgdata:
