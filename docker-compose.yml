services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-iz_clinical_notes_analyzer}
      POSTGRES_USER: ${DATABASE_USER:-iz_clinical_notes_app}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me-app}
    healthcheck:
      test: ['CMD-SHELL', 'PGPASSWORD=${DATABASE_PASSWORD:-change-me-app} pg_isready -U ${DATABASE_USER:-iz_clinical_notes_app} -d ${DATABASE_NAME:-iz_clinical_notes_analyzer}']
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-iz_clinical_notes_analyzer}
      DATABASE_USER: ${DATABASE_USER:-iz_clinical_notes_app}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change-me-app}
      POSTGRES_SERVICE_HOST: ${POSTGRES_SERVICE_HOST:-postgres}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT:-5173}}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      PORT: 8000
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=5)"']
      interval: 10s
      timeout: 8s
      start_period: 45s
      retries: 18
    ports:
      - '${BACKEND_PORT:-8000}:8000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1/index.html >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - '${FRONTEND_PORT:-5173}:80'

volumes:
  pgdata:
    name: ${POSTGRES_VOLUME_NAME:-iz_clinical_notes_analyzer_postgres_data}
